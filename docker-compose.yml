services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://ai_saas:ai_saas@db:5432/ai_saas
      AUTO_CREATE_TABLES: "false"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn backend.app.main:app --host 0.0.0.0 --port 8000"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_saas
      POSTGRES_USER: ai_saas
      POSTGRES_PASSWORD: ai_saas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_saas -d ai_saas"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
